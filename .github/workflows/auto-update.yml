name: 開獎後全自動更新與手機同步
on:
  schedule:
    # 鐵律：台灣時間週一至週六 20:40～23:50 每10分鐘監控。
    # GitHub 排程可能延遲，因此不能只排三次；任一輪取得新期別即重算並部署。
    - cron: '40,50 12 * * 1-6'
    - cron: '0,10,20,30,40,50 13-15 * * 1-6'
  workflow_dispatch: {}
permissions:
  contents: write
  pages: write
  id-token: write
  issues: write
concurrency:
  group: tw539-auto-update
  cancel-in-progress: false
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with: {python-version: '3.12'}
      - name: 鐵律完整性檢查
        run: python ironlaw_guard.py --structure-only
      - name: 取得官方開獎並重算
        run: python cloud_pipeline.py --strict-freshness
      - name: 發布前整套系統全面驗收
        run: |
          python ironlaw_guard.py
          python system_audit.py
      - name: 保存最新資料與戰報
        run: |
          git config user.name "tw539-auto-update"
          git config user.email "actions@users.noreply.github.com"
          git add data reports site
          git diff --cached --quiet || git commit -m "開獎後自動更新"
          git push
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with: {path: site}
      - uses: actions/deploy-pages@v5

      - name: 鐵律最終驗證
        run: |
          python cloud_pipeline.py --verify-only --strict-freshness
          python ironlaw_guard.py
          python system_audit.py

  alert:
    needs: update
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: 建立自動更新失敗告警
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue create --repo "${{ github.repository }}" --title "鐵律告警：539自動更新失敗 ${{ github.run_id }}" --body "自動更新、資料新鮮度或部署失敗。請立即檢查：${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
  
